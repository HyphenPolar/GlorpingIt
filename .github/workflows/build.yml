name: Build Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Force clean bootstrap
        run: |
          if (Test-Path "gradle\wrapper\gradle-wrapper.jar") {
            Remove-Item "gradle\wrapper\gradle-wrapper.jar" -Force
          }

      - name: Restore wrapper
        run: |
          .\gradlew.bat --version

      - name: Build Stonecutter versions
        run: |
          .\gradlew.bat buildAll

      - name: Remap versions
        run: |
          .\gradlew.bat remapAll

      - name: Upload all mod JARs
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod-builds
          path: |
            **/build/libs/*.jar
